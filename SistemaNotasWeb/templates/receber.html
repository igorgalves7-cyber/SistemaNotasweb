{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="glass-card p-5">
            <h2 class="fw-bold mb-4 border-bottom border-secondary pb-3">Registro de Documento Fiscal</h2>
            
            {% if not dados %}
            <!-- Área de Upload -->
            <div class="text-center py-5 border border-dashed rounded-4 mb-4">
                <form action="{{ url_for('importar') }}" method="POST" enctype="multipart/form-data">
                    <i class="bi bi-cloud-upload display-1 text-info opacity-50"></i>
                    <h4 class="mt-3">Arraste o PDF da NFS-e</h4>
                    <p class="text-muted">O sistema realizará a leitura via OCR e Regex</p>
                    <input type="file" name="file" class="form-control w-50 mx-auto mt-4" required>
                    <button type="submit" class="btn btn-senado mt-3 px-5 py-2">PROCESSAR ARQUIVO</button>
                </form>
            </div>
            {% else %}
            <!-- Formulário Preenchido -->
            <form action="{{ url_for('salvar') }}" method="POST">
                <input type="hidden" name="pdf" value="{{ dados.pdf }}">
                
                <div class="row g-4">
                    <div class="col-md-3">
                        <label class="form-label text-muted small">NÚMERO DA NOTA</label>
                        <input type="text" name="numero" class="form-control" value="{{ dados.numero }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-muted small">SÉRIE</label>
                        <input type="text" name="serie" class="form-control" value="{{ dados.serie }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-muted small">DATA DE EMISSÃO</label>
                        <input type="date" name="data_emissao" class="form-control" value="{{ dados.data_emissao }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-muted small">NUP (PROTOCOLO)</label>
                        <input type="text" name="nup" class="form-control" placeholder="00000.000000/2026-00">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label text-muted small">RAZÃO SOCIAL DO FORNECEDOR</label>
                        <input type="text" name="fornecedor" class="form-control" value="{{ dados.fornecedor }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-muted small">CNPJ DO PRESTADOR</label>
                        <input type="text" name="cnpj" class="form-control" value="{{ dados.cnpj }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small">CAMPANHA PUBLICITÁRIA</label>
                        <input type="text" name="campanha" class="form-control" value="{{ dados.campanha }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label text-muted small">CONTRATO Nº</label>
                        <input type="text" name="contrato" class="form-control" value="{{ dados.contrato }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-muted small">PEDIDO DE INSERÇÃO (PI)</label>
                        <input type="text" name="pi" class="form-control" value="{{ dados.pi }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-muted small">VALOR BRUTO (R$)</label>
                        <input type="text" name="valor" class="form-control fw-bold text-info" value="{{ dados.valor }}">
                    </div>
                </div>

                <div class="mt-5 d-flex justify-content-between">
                    <a href="/importar" class="btn btn-outline-secondary">DESCARTAR</a>
                    <button type="submit" class="btn btn-senado btn-lg px-5">AUTORIZAR REGISTRO</button>
                </div>
            </form>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
